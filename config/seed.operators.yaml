# Focused seed for JUST the console operator (RQ-0007, ADR-0010, ADR-0019, ADR-0020).
#
# The full config/seed.yaml references every ${ENV} secret and the seeder throws on any unset one — so a
# full re-seed needs all of them. This subset provisions (or repairs) only the identity-console
# APPLICATION (+ its role catalogue + web credential) and the bootstrap operator user + their assignment,
# which needs a single secret you already hold: SEED_CONSOLE_ADMIN_PASSWORD. It is the break-glass path to
# restore console access if it is ever lost.
#
# Idempotent: upserts the application + credential (with its role catalogue), inserts the user if absent
# (existing password left untouched — use `npm run manage-users set-password`), and ALWAYS upserts the
# platform_admin assignment (ADR-0019/0020) so the operator can log in. Other data is NOT touched.
#
# Run on the ds1 host, from service/ (mongo publishes :27019 on the host):
#   SEED_FILE=../config/seed.operators.yaml \
#   SEED_CONSOLE_ADMIN_PASSWORD="$(gh secret … or the known value)" \
#   MONGO_URI=mongodb://localhost:27019 MONGO_DB_NAME=identity-service npm run seed

applications:
  - id: identity-console
    name: identity-service admin console
    audience: identity-console           # token `aud` (label only — the admin plane checks iss+JWKS, not aud)
    roles:
      - { key: platform_admin, name: Platform Admin, description: Full management-plane authority (ADMIN_OPERATOR_ROLES) }
    credentials:
      - id: identity-console
        name: identity-service admin console
        grantTypes: [password]
        redirectUris: []
        isConfidential: false

users:
  - email: admin@identity-service.fps4.nl
    password: ${SEED_CONSOLE_ADMIN_PASSWORD}
    status: active
    # platform_admin on identity-console → mapped to admin authority by ADMIN_OPERATOR_ROLES (ADR-0010).
    # Upserted every run: the operator can never be locked out of the console by the assignment gate.
    assignments:
      - { application: identity-console, roles: [platform_admin] }
