# Seed config TEMPLATE (RQ-0004, ADR-0018). Copy to config/seed.yaml (gitignored on other deployments)
# and fill in real values, then run from service/:  npm run seed
#
# ONE DEPLOYMENT = ONE REALM (ADR-0018): a flat list of OAuth clients + local users, no tenant layer.
# Realm-wide settings (allowed origins, registration mode, role vocabulary, IdP toggles) are deployment
# ENV (AUTH_REGISTRATION_MODE, AUTH_LOCAL_IDP_ENABLED, AUTH_ALLOWED_ROLES, CORS_ORIGINS), not seed data.
#
# Idempotent: clients are upserted on every run; existing users are left untouched (insert-if-absent),
# so a re-run never resets a password. Use `npm run manage-users set-password` to change a password.
#
# Passwords / secrets: prefer ${ENV_VAR} references (resolved from the environment / .env at run time)
# over inline plaintext, so this file — even the gitignored real one — need not hold raw credentials.

clients:
  - id: demo-web
    name: Demo Web
    grantTypes: [password]              # local email/password login (RQ-0002)
    audience: demo-workspace            # REQUIRED for password/authorization_code — becomes the token `aud`
    redirectUris: []
    isConfidential: false

  # A machine-token (client-credentials) consumer, e.g. a telemetry ingest:
  # - id: telemetry-ingest
  #   grantTypes: [client_credentials]
  #   scopes: [telemetry:write]
  #   isConfidential: true
  #   secret: ${TELEMETRY_CLIENT_SECRET}

users:
  - email: demo@fps4.nl
    password: ${SEED_DEMO_PASSWORD}     # set SEED_DEMO_PASSWORD in the environment / .env
    status: active
    roles: [member]                     # RQ-0005: coarse roles → token `roles` claim; consumers map to permissions
  - email: admin@fps4.nl
    password: ${SEED_ADMIN_PASSWORD}    # identity-service carries roles but does not enforce them
    status: active
    roles: [platform_admin]
    # NOTE: re-running the seed leaves EXISTING users untouched (insert-if-absent). To change roles on an
    # existing user, use:  npm run manage-users -- set-roles --email=<e> --roles=platform_admin
