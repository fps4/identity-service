# Seed config TEMPLATE (RQ-0004, ADR-0018, ADR-0019). Copy to config/seed.yaml (gitignored on other
# deployments) and fill in real values, then run from service/:  npm run seed
#
# ONE DEPLOYMENT = ONE REALM (ADR-0018): a flat list of OAuth clients + local users, no tenant layer.
# Realm-wide settings (allowed origins, registration mode, IdP toggles) are deployment ENV
# (AUTH_REGISTRATION_MODE, AUTH_LOCAL_IDP_ENABLED, CORS_ORIGINS), not seed data.
#
# PER-APPLICATION ROLES + ENTITLEMENTS (ADR-0019): each client declares its role CATALOGUE (`roles:`), and
# a user only gets access + roles for an app via an ASSIGNMENT (`assignments:` on the user, or an invite /
# the admin plane at runtime). A user with no assignment for an app cannot obtain a token for it.
#
# Idempotent: clients (+ catalogues) are upserted every run; a new user is inserted (existing passwords are
# left untouched — use `npm run manage-users set-password`); assignments are upserted every run.

clients:
  - id: demo-web
    name: Demo Web
    grantTypes: [password]              # local email/password login (RQ-0002)
    audience: demo-workspace            # REQUIRED for password/authorization_code — becomes the token `aud`
    redirectUris: []
    isConfidential: false
    roles:                              # the app's role catalogue → assignable per user, → token `roles`
      - { key: member, name: Member }
      - { key: admin, name: Admin }

  # A machine-token (client-credentials) consumer, e.g. a telemetry ingest. Machine clients have no users
  # and no assignments — they authenticate with a secret and carry `scopes`, not app-roles.
  # - id: telemetry-ingest
  #   grantTypes: [client_credentials]
  #   scopes: [telemetry:write]
  #   isConfidential: true
  #   secret: ${TELEMETRY_CLIENT_SECRET}

users:
  - email: demo@fps4.nl
    password: ${SEED_DEMO_PASSWORD}     # set SEED_DEMO_PASSWORD in the environment / .env
    status: active
    assignments:                        # entitles this user to demo-web with the `member` role (ADR-0019)
      - { client: demo-web, roles: [member] }
  - email: admin@fps4.nl
    password: ${SEED_ADMIN_PASSWORD}
    status: active
    assignments:
      - { client: demo-web, roles: [admin] }
    # NOTE: re-running the seed leaves an existing user's PASSWORD untouched but re-upserts assignments. To
    # change roles on an app, edit the assignment here (re-seed) or use the admin plane / `assign_user`.
