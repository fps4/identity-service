# Seed config TEMPLATE (RQ-0004, ADR-0018/0019/0020). Copy to config/seed.yaml (gitignored on other
# deployments) and fill in real values, then run from service/:  npm run seed
#
# THE APPLICATION IS THE UNIT (ADR-0020). One deployment = one realm (ADR-0018). Each product is one
# APPLICATION that owns its default `audience` and its role catalogue (`roles:`) and contains typed
# CREDENTIALS (a web login client, a machine/runtime client, …). A credential may set its own `audience`
# to OVERRIDE the application default. Users are assigned to an application with app-scoped roles
# (`assignments:` on the user) — a user with no assignment for an app cannot obtain a token for it.
#
# Realm-wide settings (allowed origins, registration mode, IdP toggle) are deployment ENV
# (AUTH_REGISTRATION_MODE, AUTH_LOCAL_IDP_ENABLED, CORS_ORIGINS), not seed data.
#
# Idempotent: applications + credentials are upserted every run; a new user is inserted (existing
# passwords untouched — `npm run manage-users set-password`); assignments are upserted every run.

applications:
  - id: demo
    name: Demo
    audience: demo-workspace             # inherited by the app's credentials as the token `aud`
    roles:                               # the app's role catalogue → assignable per user → token `roles`
      - { key: member, name: Member }
      - { key: admin, name: Admin }
    credentials:
      - id: demo-web
        name: Demo Web
        grantTypes: [password]           # local email/password login (RQ-0002)
        redirectUris: []
        isConfidential: false
      # A machine (client-credentials) credential under the same application — e.g. a backend runtime.
      # Machine credentials have no users/assignments; they authenticate with a secret and carry `scopes`.
      # - id: demo-runtime
      #   grantTypes: [client_credentials]
      #   scopes: [telemetry:write]
      #   isConfidential: true
      #   secret: ${DEMO_RUNTIME_SECRET}
      #   audience: maestro-workspace     # OVERRIDE if this runtime's token is aimed elsewhere

users:
  - email: demo@fps4.nl
    password: ${SEED_DEMO_PASSWORD}      # set SEED_DEMO_PASSWORD in the environment / .env
    status: active
    assignments:                         # entitles this user to the demo app with the `member` role
      - { application: demo, roles: [member] }
  - email: admin@fps4.nl
    password: ${SEED_ADMIN_PASSWORD}
    status: active
    assignments:
      - { application: demo, roles: [admin] }
