# Focused STRUCTURAL seed for the Skills Coach (ADR-0011, ADR-0019, ADR-0020).
#
# Per ADR-0011, applications + credentials are declarative/GitOps (this file); users + credentials are
# operational and owned by the live DB (ADR-0008), managed via the admin plane. So this file lists NO
# users and references NO ${SEED_*} secrets — it is dispatchable on its own.
#
# One deployment = one realm (ADR-0018); the coach is ONE application (ADR-0020) owning its audience +
# role catalogue, with the `coach-web` credential under it. Its demo users (admin@/learner@/officer@
# coach.fps4.nl) live in the DB and are NOT touched here. Keep in sync with the `coach` app in seed.yaml.
#
# Apply via the seed-ds1 workflow:  gh workflow run seed-ds1.yml -f seed_file=config/seed.coach.yaml
# Or on the ds1 host from service/:  SEED_FILE=../config/seed.coach.yaml \
#   MONGO_URI=mongodb://localhost:27019 MONGO_DB_NAME=identity-service npm run seed

applications:
  - id: coach
    name: Skills Coach
    audience: coach-workspace            # matches the coach API's IDENTITY_SERVICE_AUDIENCE
    roles:                               # the coach role catalogue (ADR-0019) → token `roles` (RQ-0005)
      - { key: learner, name: Learner }
      - { key: compliance-officer, name: Compliance Officer }
    credentials:
      - id: coach-web
        name: Skills Coach Web
        grantTypes: [password, authorization_code]   # password + Google SSO (authorization_code + PKCE, RQ-0012)
        redirectUris:                    # the coach web /auth/callback (exact-match validated) — RQ-0012
          - http://localhost:3000/auth/callback   # local dev
          - https://coach.fps4.nl/auth/callback   # NL production surface
        isConfidential: false            # public client — the browser sends client_id with no secret
