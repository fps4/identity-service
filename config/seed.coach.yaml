# Focused STRUCTURAL seed for the Skills Coach (ADR-0011).
#
# Per ADR-0011, tenants + OAuth clients are declarative/GitOps (this file); users + credentials are
# operational and owned by the live DB (ADR-0008), managed via the admin plane (console/HTTP/MCP). So
# this file intentionally lists NO users and references NO ${SEED_*} secrets — it is dispatchable on its
# own without any other tenant's password.
#
# It exists because the full config/seed.yaml references every tenant's ${SEED_*} secret and the seeder
# throws on any unset one; this subset provisions (or repairs) just the coach tenant + the `coach-web`
# client. The coach's demo users (admin@/learner@/officer@coach.fps4.nl) live in the DB and are NOT
# touched by this file. Keep the tenant + client in sync with the `coach` block in seed.yaml.
#
# Idempotent: upserts the `coach` tenant + `coach-web` client. Other tenants are NOT touched.
#
# Apply via the seed-ds1 workflow:  gh workflow run seed-ds1.yml -f seed_file=config/seed.coach.yaml
# Or on the ds1 host from service/:  SEED_FILE=../config/seed.coach.yaml \
#   MONGO_URI=mongodb://localhost:27019 MONGO_DB_NAME=identity-service npm run seed

tenants:
  # Skills Coach — resource server verifies aud=coach-workspace + the `roles` claim.
  - id: coach
    name: Skills Coach
    status: active
    allowedOrigins:
      - http://localhost:3000        # local dev (web runs on :3000)
      - https://coach.fps4.nl        # NL production surface
    oauth:
      # Both IdPs: local email/password (seeded users) AND Google SSO (RQ-0001) via the redirect flow.
      # The effective gate is the grant types; `idp.provider` is a single-valued declarative marker, so
      # it stays `local` (the seeded-credential IdP) — Google is enabled by allowing authorization_code.
      enabled: true
      allowedGrantTypes: [password, authorization_code]
      allowedScopes: []
      allowedRoles: [learner, compliance-officer]   # RQ-0005: coach role vocabulary → token `roles`
      idp: { provider: local }
      limits: { tokensPerMinute: 200 }
    clients:
      - id: coach-web
        name: Skills Coach Web
        grantTypes: [password, authorization_code]   # password + Google SSO (authorization_code + PKCE, RQ-0012)
        audience: coach-workspace     # becomes the token `aud` (matches the coach API's IDENTITY_SERVICE_AUDIENCE)
        redirectUris:                 # the coach web /auth/callback (exact-match validated) — RQ-0012
          - http://localhost:3000/auth/callback   # local dev
          - https://coach.fps4.nl/auth/callback   # NL production surface
        isConfidential: false         # public client — the browser sends client_id with no secret
