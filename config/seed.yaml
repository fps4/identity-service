# ds1 identity BOOTSTRAP definition (non-secret). The live MongoDB is the system of record (ADR-0007);
# this file only stands up a brand-new empty deployment. Day-2 changes go through the management plane
# (/admin/v1 + MCP + console), not a re-seed.
#
# COMMITTED on purpose: every secret here is an ${ENV_VAR} reference resolved at run time, so this file
# holds NO plaintext. SOPS is DROPPED (ADR-0008, superseding ADR-0006): there is no encrypted values file
# in git. For the rare bootstrap of an empty DB, supply the ${ENV} values from the environment (CI/Actions
# secrets or an operator shell), e.g. from service/:
#
#     IDENTITY_ADMIN_CLIENT_SECRET=… SEED_ADMIN_PASSWORD=… MAESTRO_COMPONENTS_DS1_SECRET=… \
#       MONGO_URI=mongodb://localhost:27019 MONGO_DB_NAME=identity-service npm run seed
#
# Disaster recovery is a RESTORE from the nightly off-host backup (docker/backup.sh — ADR-0008), which
# also recovers runtime state a re-seed cannot. Idempotent: tenants + clients are upserted on every run;
# existing users are left untouched (insert-if-absent). Use `npm run manage-users -- set-password …` to
# change a password. See docs/guides/deployment.md.

tenants:
  - id: demo
    name: Demo Tenant
    status: active
    allowedOrigins:
      - http://localhost:3000
    oauth:
      enabled: true
      allowedGrantTypes: [password]      # local email/password login (RQ-0002)
      allowedScopes: []
      idp: { provider: local }           # required when the tenant has users
      limits: { tokensPerMinute: 200 }
    clients:
      - id: demo-web
        name: Demo Web
        grantTypes: [password]
        audience: demo-workspace         # REQUIRED for password/authorization_code — becomes the token `aud`
        redirectUris: []
        isConfidential: false
    users:
      - email: demo@fps4.nl
        password: ${SEED_DEMO_PASSWORD}  # set SEED_DEMO_PASSWORD in the environment / .env
        status: active
      - email: admin@fps4.nl
        password: ${SEED_ADMIN_PASSWORD} # "admin" is just a labelled user — identity-service has no role concept
        status: active

  - id: sovereign-copilot
    name: Sovereign Copilot
    status: active
    allowedOrigins:
      - http://localhost:3033        # local dev (web runs on :3033)
      - http://ds1:3033              # ds1 demo
      - https://copilot.fps4.nl      # NL production surface
      - https://copilot.fps4.com     # .com production surface
    oauth:
      enabled: true
      allowedGrantTypes: [password]
      allowedScopes: []
      idp: { provider: local }
      limits: { tokensPerMinute: 200 }
    clients:
      - id: sovereign-copilot-web
        name: Sovereign Copilot Web
        grantTypes: [password]
        audience: sovereign-copilot-workspace   # becomes the token `aud`
        redirectUris: []
        isConfidential: false
    users:
      - email: demo@sovereign-copilot.fps4.nl
        password: ${SEED_SOVEREIGN_COPILOT_DEMO_PASSWORD}
        status: active
      - email: admin@sovereign-copilot.fps4.nl
        password: ${SEED_SOVEREIGN_COPILOT_ADMIN_PASSWORD}
        status: active

  - id: maestro
    name: Maestro
    status: active
    allowedOrigins:
      - http://localhost:3034        # local dev (web runs on :3034)
      - http://ds1:3034              # ds1 demo
      - https://maestro.fps4.nl      # NL production surface
      - https://maestro.fps4.com     # .com production surface
    oauth:
      enabled: true
      allowedGrantTypes: [password, client_credentials]
      allowedScopes: []
      idp: { provider: local }
      limits: { tokensPerMinute: 200 }
    clients:
      - id: maestro-web
        name: Maestro Web
        grantTypes: [password]
        audience: maestro-workspace             # becomes the token `aud`
        redirectUris: []
        isConfidential: false
      # The product_runtime machine principals (US-0086): each deployment's runtime exchanges its
      # client_id/secret for a short-lived JWT (aud=maestro-workspace) that maestro's intake accepts.
      # The secret MUST equal the consuming repo's MAESTRO_RUNTIME_CLIENT_SECRET Actions secret.
      - id: sovereign-llm-gateway-ds1
        name: sovereign-llm-gateway@ds1 runtime
        grantTypes: [client_credentials]
        isConfidential: true
        secret: ${MAESTRO_GATEWAY_DS1_SECRET}
        audience: maestro-workspace
        subject: runtime@sovereign-llm-gateway.fps4.nl
        claims:
          role: product_runtime
          email: runtime@sovereign-llm-gateway.fps4.nl
      - id: sovereign-copilot-ds1
        name: sovereign-copilot@ds1 runtime
        grantTypes: [client_credentials]
        isConfidential: true
        secret: ${MAESTRO_COPILOT_DS1_SECRET}
        audience: maestro-workspace
        subject: runtime@sovereign-copilot.fps4.nl
        claims:
          role: product_runtime
          email: runtime@sovereign-copilot.fps4.nl
      # identity-service's own runtime: it reports its fleet health/telemetry to maestro under the
      # "components" (Shared Components) product, whose ds1 deployment maestro's register keys to this
      # identity (runtime@components.fps4.nl). Self-minted via this service's own token endpoint.
      - id: components-ds1
        name: components@ds1 runtime
        grantTypes: [client_credentials]
        isConfidential: true
        secret: ${MAESTRO_COMPONENTS_DS1_SECRET}
        audience: maestro-workspace
        subject: runtime@components.fps4.nl
        claims:
          role: product_runtime
          email: runtime@components.fps4.nl
    users:
      - email: po@maestro.fps4.nl
        password: ${SEED_MAESTRO_PO_PASSWORD}
        status: active
      - email: sa@maestro.fps4.nl
        password: ${SEED_MAESTRO_SA_PASSWORD}
        status: active
      - email: admin@maestro.fps4.nl
        password: ${SEED_MAESTRO_ADMIN_PASSWORD}
        status: active

  # Sovereign Skills Coach — resource server verifies aud=coach-workspace + the `roles` claim.
  - id: coach
    name: Sovereign Skills Coach
    status: active
    allowedOrigins:
      - http://localhost:3000        # local dev (web runs on :3000)
      - https://coach.fps4.nl        # NL production surface
    oauth:
      enabled: true
      allowedGrantTypes: [password]
      allowedScopes: []
      allowedRoles: [learner, compliance-officer]   # RQ-0005: coach role vocabulary → token `roles`
      idp: { provider: local }
      limits: { tokensPerMinute: 200 }
    clients:
      - id: coach-web
        name: Sovereign Skills Coach Web
        grantTypes: [password]
        audience: coach-workspace     # becomes the token `aud` (matches the coach API's IDENTITY_SERVICE_AUDIENCE)
        redirectUris: []
        isConfidential: false
    users:
      # Admin first — full access to both surfaces (tutor + compliance read view).
      - email: admin@coach.fps4.nl
        password: ${SEED_COACH_ADMIN_PASSWORD}
        status: active
        roles: [compliance-officer, learner]
      - email: learner@coach.fps4.nl
        password: ${SEED_COACH_LEARNER_PASSWORD}
        status: active
        roles: [learner]
      - email: officer@coach.fps4.nl
        password: ${SEED_COACH_OFFICER_PASSWORD}
        status: active
        roles: [compliance-officer]

  # identity-service's OWN management-plane principal (ADR-0007). A client_credentials client whose
  # token carries the `admin` scope — the credential the /admin/v1 API, the MCP server, and the admin
  # console authenticate with. Isolated in its own tenant so management authority never rides on a
  # product tenant. The secret is the ${IDENTITY_ADMIN_CLIENT_SECRET} reference, resolved from the env at
  # seed time and injected into the container by the deploy (GitHub Actions secret — ADR-0008). Mint with:
  #   curl -s -XPOST $AUTH_JWT_ISSUER/oauth2/token -d grant_type=client_credentials \
  #        -d client_id=identity-admin-mcp -d client_secret=$IDENTITY_ADMIN_CLIENT_SECRET -d scope=admin
  - id: identity-service-ops
    name: identity-service operations
    status: active
    oauth:
      enabled: true
      allowedGrantTypes: [client_credentials]
      allowedScopes: [admin, "admin:tenants", "admin:clients", "admin:users", "admin:keys", "admin:stats"]
      idp: { provider: local }
      limits: { tokensPerMinute: 60 }
    clients:
      - id: identity-admin-mcp
        name: identity-service admin (MCP + console)
        grantTypes: [client_credentials]
        isConfidential: true
        secret: ${IDENTITY_ADMIN_CLIENT_SECRET}
        scopes: [admin]              # full management authority (see ADMIN_SCOPES); request scope=admin
        subject: admin-mcp@identity-service.fps4.nl   # attributed in the /admin audit log
