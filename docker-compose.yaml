services:
  mongo:
    container_name: core-auth-mongo
    image: mongo:latest
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db

  core-auth:
    container_name: core-auth
    build:
      context: ./service
      dockerfile: Dockerfile
    depends_on:
      - mongo
    environment:
      PORT: 7305
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: core-auth
      AUTH_JWT_SECRET: local-dev-secret
      AUTH_JWT_ISSUER: core-auth-service
      AUTH_JWT_AUDIENCE: core-auth-clients
      SESSION_TTL_MINUTES: 15
      OAUTH_ACCESS_TOKEN_TTL_SEC: 900
      OAUTH_REFRESH_TOKEN_TTL_SEC: 2592000
      OAUTH_TENANT_MAX_CLIENTS: 50
      OAUTH_TENANT_MAX_TOKENS_PER_MINUTE: 200
      OAUTH_TENANT_MAX_REFRESH_TOKENS: 10000
      OAUTH_KEY_PASSPHRASE: ""
      OAUTH_KEY_ROTATION_HOURS: 720
      LOG_LEVEL: debug
      LOG_PRETTY: "true"
    ports:
      - "7305:7305"

volumes:
  mongo_data:
