# Deploy identity-service to the ds1 host after a green Definition of Done on main.
#
# Runs on the shared org ds1 runner: a CONTAINERISED GitHub Actions runner with only the host Docker
# socket mounted. So this job drives the host daemon purely through `docker` / `docker compose` — it
# has NO Node and does NOT share a network with the deployed stack. Hence:
#   * compose is invoked directly (the SSH/`DOCKER_HOST` runbook still works from a laptop);
#   * health is read via `docker inspect` over the socket, NOT curl to a host port the runner can't reach
#     (compose.prod.yaml defines the /health healthcheck this gate polls).
#
# Secrets never live in git (fps4 standard). config/ds1/.env is assembled at deploy time from the
# committed non-secret base (config/ds1/.env.base) plus repo Actions secrets, written runner-local, and
# removed in the always-cleanup step. The seed (tenants/clients/users — config/seed.yaml) stays an
# operator step (RQ-0004): this pipeline ships the service, not the seed data.
#
# Optional repo Actions secrets (appended only when set — the ds1 SMOKE posture runs without them):
#   OAUTH_KEY_PASSPHRASE   encrypts the RS256 signing keys at rest
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET / GOOGLE_REDIRECT_URI   enable Google SSO (password IdP
#                                                                   works without them)
name: deploy-ds1

# Branch protection is unavailable on this plan, so the deploy is gated on the DoD itself: fire only
# after "Definition of Done" completes on main, and only when it succeeded.
on:
  workflow_run:
    workflows: ["Definition of Done"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# Never let two deploys race on the same host; queue them, and don't cancel an in-flight deploy.
concurrency:
  group: deploy-ds1
  cancel-in-progress: false

env:
  COMPOSE: docker compose -f docker/compose.yaml -f docker/compose.prod.yaml -p identity-service --env-file config/ds1/.env

jobs:
  deploy:
    # Manual dispatch always deploys; the chained path only on a green DoD for a push to main.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.event == 'push')
    runs-on: [self-hosted, ds1]
    timeout-minutes: 30
    steps:
      - name: Checkout the deployed commit
        uses: actions/checkout@v4
        with:
          # workflow_run doesn't checkout the triggering commit by default — pin to the exact main SHA
          # the DoD validated. Manual runs fall back to the ref.
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Assemble config/ds1/.env (committed base + Actions secrets; runner-local)
        env:
          OAUTH_KEY_PASSPHRASE: ${{ secrets.OAUTH_KEY_PASSPHRASE }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          # Runtime secret for the maestro fleet-telemetry channel. Must equal the seeded
          # seeded identity-service-ds1-runtime client secret (in the live DB — ADR-0008). Unset → telemetry stays inert.
          MAESTRO_RUNTIME_CLIENT_SECRET: ${{ secrets.MAESTRO_RUNTIME_CLIENT_SECRET }}
          # Management-plane admin client secret (ADR-0007). Injected into the service container so the
          # in-container MCP launcher (docker/mcp-admin.sh) can mint an admin token. Must equal the
          # seeded identity-admin-mcp client secret (in the live DB — ADR-0008). Unset → MCP admin auth off.
          IDENTITY_ADMIN_CLIENT_SECRET: ${{ secrets.IDENTITY_ADMIN_CLIENT_SECRET }}
        run: |
          umask 077
          cp config/ds1/.env.base config/ds1/.env
          {
            [ -n "$OAUTH_KEY_PASSPHRASE" ] && echo "OAUTH_KEY_PASSPHRASE=$OAUTH_KEY_PASSPHRASE"
            [ -n "$GOOGLE_CLIENT_ID" ] && echo "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID"
            [ -n "$GOOGLE_CLIENT_SECRET" ] && echo "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET"
            [ -n "$GOOGLE_REDIRECT_URI" ] && echo "GOOGLE_REDIRECT_URI=$GOOGLE_REDIRECT_URI"
            [ -n "$MAESTRO_RUNTIME_CLIENT_SECRET" ] && echo "MAESTRO_RUNTIME_CLIENT_SECRET=$MAESTRO_RUNTIME_CLIENT_SECRET"
            [ -n "$IDENTITY_ADMIN_CLIENT_SECRET" ] && echo "IDENTITY_ADMIN_CLIENT_SECRET=$IDENTITY_ADMIN_CLIENT_SECRET"
          } >> config/ds1/.env
          [ -n "$MAESTRO_RUNTIME_CLIENT_SECRET" ] || echo "::warning::MAESTRO_RUNTIME_CLIENT_SECRET unset — maestro fleet telemetry stays dormant"
          [ -n "$IDENTITY_ADMIN_CLIENT_SECRET" ] || echo "::warning::IDENTITY_ADMIN_CLIENT_SECRET unset — management plane / MCP admin auth unavailable"
          [ -n "$OAUTH_KEY_PASSPHRASE" ] || echo "::warning::OAUTH_KEY_PASSPHRASE unset — signing keys stored unencrypted at rest (ds1 SMOKE)"
          echo "Assembled config/ds1/.env ($(grep -c . config/ds1/.env) non-empty lines)"

      - name: Build + deploy (compose against the mounted host daemon)
        # The image build runs `npm run build && npm test`, so a type error or red test fails the deploy.
        run: |
          $COMPOSE build
          # Reconcile any prior stack before recreating. The services use fixed container_names, so a
          # leftover container from the manual-SSH era (created under a different compose project) would
          # otherwise collide on `up`. Bring our project down (KEEPING the data volume — no -v), then
          # force-remove any leftover fixed-name containers. Idempotent: on a steady-state redeploy this
          # is just a clean restart; the mongo data volume (identity-service_mongo_data) persists.
          #
          # Also clear the PRE-RENAME containers (component-auth / component-auth-mongo). The old
          # component-auth-mongo binds host port 27019, so while it lingers the new identity-service-mongo
          # cannot start ("port is already allocated") and every deploy fails. Removing the stale container
          # frees the port; the new mongo comes up on the fresh identity-service_mongo_data volume (the DB
          # is then re-seeded from config/seed.yaml — an operator step, RQ-0004). The old
          # component-auth_mongo_data volume is intentionally left in place as a rollback.
          $COMPOSE down --remove-orphans || true
          docker rm -f identity-service identity-service-mongo component-auth component-auth-mongo 2>/dev/null || true
          $COMPOSE up -d --remove-orphans

      - name: Wait for health (identity-service, via docker inspect over the socket)
        run: |
          ok=0
          for i in $(seq 1 60); do            # up to ~5 min
            s=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' identity-service 2>/dev/null || echo missing)
            echo "identity-service: $s"
            [ "$s" = "healthy" ] && { ok=1; break; }
            [ "$s" = "missing" ] && { echo "::error::identity-service container not found"; break; }
            sleep 5
          done
          docker logs --tail 20 identity-service 2>&1 | tail -20 || true
          [ "$ok" = 1 ] || { echo "::error::identity-service did not become healthy"; exit 1; }

      - name: Report product_runtime client coverage (non-blocking — ADR-0017)
        # A managed-product runtime authorizes to maestro with a client_credentials JWT minted from a
        # `product_runtime` client in THIS service's DB (US-0086; docs/reference/product-runtime-credential.md).
        # This step used to HARD-FAIL the deploy on any seed-vs-DB gap. That red-walled every unrelated merge
        # (the deploy re-fires on each green DoD) for seed-data state a deploy cannot fix — see
        # docs/guides/ds1-delivery-pipeline-findings.md. Per ADR-0017:
        #   * other products now SELF-REGISTER their runtime client via an operator-issued invite (RQ-0018),
        #     so config/seed.yaml declares only identity-service's OWN runtime client — the deploy is no
        #     longer the right place to notice another product's missing registration;
        #   * the fleet-level "can every managed runtime mint a token?" check belongs to MAESTRO, which owns
        #     the register of expected runtimes and their telemetry (agentic-ops), as an ALERT — not this gate.
        # So this stays as a NON-BLOCKING signal: it reports coverage and warns on a gap, but never exits 1.
        run: |
          DB=$(grep -E '^MONGO_DB_NAME=' config/ds1/.env.base | cut -d= -f2)
          DB=${DB:-identity-service}
          expected=$(grep -cE '^[[:space:]]*role:[[:space:]]*product_runtime[[:space:]]*$' config/seed.yaml || true)
          echo "config/seed.yaml declares ${expected:-0} product_runtime client(s) (identity-service's own)"
          actual=$(docker exec identity-service-mongo mongosh "$DB" --quiet \
            --eval 'db.oauth_clients.countDocuments({"claims.role":"product_runtime"})' 2>/dev/null | tr -dc '0-9')
          echo "ds1 auth DB ($DB) has ${actual:-0} product_runtime client(s) total (incl. self-registered — ADR-0017)"
          if [ "${actual:-0}" -lt "${expected:-0}" ]; then
            echo "::warning::identity-service's own product_runtime client is not seeded on ds1 (${actual:-0}/${expected})."
            echo "::warning::Re-seed with: MAESTRO_RUNTIME_CLIENT_SECRET=… MONGO_URI=mongodb://localhost:27019 MONGO_DB_NAME=$DB npm run seed"
            echo "::warning::Fleet-wide runtime-registration coverage is monitored by maestro (ADR-0017), not this deploy."
          else
            echo "OK: identity-service's own product_runtime client is present — it can authorize to maestro."
          fi

      - name: Cleanup assembled secrets (always)
        if: always()
        run: rm -f config/ds1/.env

      - name: Deployed revision
        if: success()
        run: echo "ds1 now running ${GITHUB_SHA::12} (from ${GITHUB_REF_NAME})"
