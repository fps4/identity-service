# Publish @fps4/identity-service-sdk to GitHub Packages (npm.pkg.github.com).
#
# Trigger: push a tag `sdk-v<version>` (e.g. sdk-v0.1.0) — the version must match sdk/package.json.
# Or run manually via workflow_dispatch (with an optional dry-run).
#
# Auth: the automatic GITHUB_TOKEN (with `packages: write` below) publishes @fps4 packages to THIS
# repo's org — the reliable path for GitHub Packages' npm registry (which rejects fine-grained PATs).
# The committed sdk/.npmrc maps @fps4 -> GitHub Packages and reads NODE_AUTH_TOKEN.
name: publish-sdk

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build + pack, no upload)'
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-sdk
  cancel-in-progress: false

jobs:
  publish:
    name: publish @fps4/identity-service-sdk
    runs-on: [self-hosted, ds1]
    defaults:
      run:
        working-directory: sdk
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      # On a tag push, the tag's version must match package.json (sdk-v0.1.0 -> 0.1.0).
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/sdk-v')
        run: |
          tag="${GITHUB_REF_NAME#sdk-v}"
          pkg="$(node -p "require('./package.json').version")"
          echo "tag=$tag package.json=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag sdk-v$tag does not match sdk/package.json version $pkg"
            exit 1
          fi

      # prepublishOnly (clean + build) runs automatically before publish, so dist is always fresh.
      - name: Publish to GitHub Packages
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run — packing without uploading."
            npm publish --dry-run
          else
            npm publish
            echo "::notice::Published @fps4/identity-service-sdk@$(node -p "require('./package.json').version") to GitHub Packages"
          fi
