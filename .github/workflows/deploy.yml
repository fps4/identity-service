# ─────────────────────────────────────────────────────────────────────────────
# Automated CI deploys are OFF. component-auth deploys MANUALLY over SSH to a
# Docker host — see docs/guides/deployment.md for the runbook.
#
# This workflow is intentionally manual-only (workflow_dispatch): it never runs on
# push, so a docs or code merge never triggers a deploy. The self-hosted-runner
# flow that previously drove deploys is preserved (commented) at the bottom so it
# can be restored if the project moves back to CI-driven deploys.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy (manual reference)

on:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - name: Deploys are manual
        run: |
          echo "component-auth deploys manually over SSH to a Docker host."
          echo "See docs/guides/deployment.md for the runbook."

