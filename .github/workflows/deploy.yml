# ─────────────────────────────────────────────────────────────────────────────
# DISABLED — automated deploys via self-hosted runners are turned off.
#
# component-auth now deploys MANUALLY to the ds1 lab docker host over SSH, the same
# pattern the sibling fps4 stacks use (maestro, copilot):
#
#   export DOCKER_HOST=ssh://ds1
#   docker compose --env-file docker/.env \
#     -f docker/compose.yaml -f docker/compose.dev.yaml up -d --build
#
# (`docker/.env` is gitignored and holds the per-site secrets: GOOGLE_CLIENT_ID/SECRET,
#  OAUTH_KEY_PASSPHRASE, the HTTPS AUTH_JWT_ISSUER, etc. — never committed.)
#
# See README.md ("Deployments") for the full runbook. This file is kept (fully
# commented) rather than deleted so the runner-based flow can be restored if we move
# back to CI-driven deploys; with no `on:` triggers below, GitHub Actions ignores it.
# ─────────────────────────────────────────────────────────────────────────────

