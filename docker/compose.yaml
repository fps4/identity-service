services:
  # One-shot: a fresh named volume mounts root-owned, but the mongo image runs as uid 1001 and would
  # fail to write to /bitnami/mongodb. Fix ownership before mongo starts (idempotent, exits 0).
  mongo-init-perms:
    container_name: identity-service-mongo-init
    image: ghcr.io/flakybitnet/mongodb-server:8.0.13-fb1
    user: "0:0"
    # Override the bitnami entrypoint so this is a pure chown, not a mongo boot.
    entrypoint: ["chown", "-R", "1001:1001", "/bitnami/mongodb"]
    command: []
    volumes:
      - mongo_data:/bitnami/mongodb
    restart: "no"

  mongo:
    container_name: identity-service-mongo
    # MongoDB 5.0+ requires AVX; using `mongo:latest` pulls a newer major
    # Ref: https://github.com/flakybitnet/mongodb-oci
    image: ghcr.io/flakybitnet/mongodb-server:8.0.13-fb1
    restart: unless-stopped
    depends_on:
      mongo-init-perms:
        condition: service_completed_successfully
    ports:
      - "${MONGO_PORT:-27019}:27017"
    volumes:
      # This is a Bitnami-style image: mongod's dbPath is /bitnami/mongodb/data/db, NOT /data/db.
      # Mounting at /data/db (the stock-mongo path) left the real data in the container's EPHEMERAL
      # layer — wiped on every container recreation (i.e. every deploy). Persist /bitnami/mongodb so
      # the database actually survives.
      - mongo_data:/bitnami/mongodb

  identity-service:
    container_name: identity-service
    build:
      context: ../service
      dockerfile: Dockerfile
    depends_on:
      - mongo
    networks:
      - default
      - net-public
    environment:
      PORT: ${PORT:-7305}
      NODE_ENV: ${NODE_ENV:-production}
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017}
      MONGO_DB_NAME: ${MONGO_DB_NAME:-identity-service}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-local-dev-secret}
      AUTH_JWT_ISSUER: ${AUTH_JWT_ISSUER:-identity-service}
      AUTH_JWT_AUDIENCE: ${AUTH_JWT_AUDIENCE:-identity-service-clients}
      SESSION_TTL_MINUTES: ${SESSION_TTL_MINUTES:-15}
      OAUTH_ACCESS_TOKEN_TTL_SEC: ${OAUTH_ACCESS_TOKEN_TTL_SEC:-900}
      OAUTH_REFRESH_TOKEN_TTL_SEC: ${OAUTH_REFRESH_TOKEN_TTL_SEC:-2592000}
      OAUTH_TENANT_MAX_CLIENTS: ${OAUTH_TENANT_MAX_CLIENTS:-50}
      OAUTH_TENANT_MAX_TOKENS_PER_MINUTE: ${OAUTH_TENANT_MAX_TOKENS_PER_MINUTE:-200}
      OAUTH_TENANT_MAX_REFRESH_TOKENS: ${OAUTH_TENANT_MAX_REFRESH_TOKENS:-10000}
      OAUTH_KEY_PASSPHRASE: ${OAUTH_KEY_PASSPHRASE:-}
      OAUTH_KEY_ROTATION_HOURS: ${OAUTH_KEY_ROTATION_HOURS:-720}
      # Management-plane admin client secret (ADR-0007). Present in the container so the in-container MCP
      # launcher (docker/mcp-admin.sh) can mint an admin token; must equal the seeded client secret.
      IDENTITY_ADMIN_CLIENT_SECRET: ${IDENTITY_ADMIN_CLIENT_SECRET:-}
      # Operator-login (ADR-0010): user tokens whose `roles` include one of these are accepted by the
      # management plane as a per-actor operator principal. Matches the `operators` tenant in seed.yaml.
      ADMIN_OPERATOR_ROLES: ${ADMIN_OPERATOR_ROLES:-platform_admin}
      # Remote MCP transport (ADR-0009). MCP_RESOURCE_URL overrides the default (AUTH_JWT_ISSUER/mcp) with
      # the dedicated origin (auth-mcp.fps4.nl on ds1); audience-binding (RFC 8707) then requires a token
      # minted for that resource. Empty MCP_RESOURCE_URL falls back to the app default.
      MCP_HTTP_ENABLED: ${MCP_HTTP_ENABLED:-true}
      MCP_RESOURCE_URL: ${MCP_RESOURCE_URL:-}
      MCP_REQUIRE_AUDIENCE: ${MCP_REQUIRE_AUDIENCE:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: ${LOG_PRETTY:-false}
      # Outbound fleet monitoring to maestro. Empty MAESTRO_API_URL keeps the channel inert (default).
      MAESTRO_API_URL: ${MAESTRO_API_URL:-}
      MAESTRO_PRODUCT_ID: ${MAESTRO_PRODUCT_ID:-identity-service}
      MAESTRO_DEPLOYMENT_ID: ${MAESTRO_DEPLOYMENT_ID:-ds1}
      MAESTRO_RUNTIME_CLIENT_ID: ${MAESTRO_RUNTIME_CLIENT_ID:-identity-service-ds1-runtime}
      MAESTRO_RUNTIME_CLIENT_SECRET: ${MAESTRO_RUNTIME_CLIENT_SECRET:-}
    ports:
      - "${CORE_AUTH_PORT:-7305}:7305"

  # Operator admin console (RQ-0007, ADR-0007/0010). A thin Next.js client over /admin/v1 — holds no DB
  # credentials. Operators sign in with the `password` grant (browser → public issuer) and the console
  # forwards their token server-side. Published on :7306; the Cloudflare hostname ids.fps4.nl
  # points at the docker host's :7306. On net-public so the tunnel can reach it.
  console:
    container_name: identity-service-console
    build:
      context: ../console
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are baked into the CLIENT bundle at BUILD time — they must be build args, not runtime
      # env (the browser ignores container env). The browser runs the password grant against the PUBLIC
      # issuer; the client id must match the `identity-console` client in seed.yaml.
      args:
        NEXT_PUBLIC_IDENTITY_SERVICE_BASE: ${CONSOLE_IDENTITY_BASE:-https://auth.fps4.nl}
        NEXT_PUBLIC_IDENTITY_SERVICE_CLIENT_ID: ${CONSOLE_CLIENT_ID:-identity-console}
    depends_on:
      - identity-service
    networks:
      - default
      - net-public
    environment:
      # Next standalone server (node server.js) honours PORT/HOSTNAME — bind all interfaces on 7306.
      PORT: "7306"
      HOSTNAME: "0.0.0.0"
      NODE_ENV: ${NODE_ENV:-production}
      # Server-side (lib/api, server-only) call to the management API on the internal docker network.
      ADMIN_API_URL: ${CONSOLE_ADMIN_API_URL:-http://identity-service:7305/admin/v1}
    ports:
      - "${CONSOLE_PORT:-7306}:7306"

volumes:
  mongo_data:

networks:
  net-public:
    external: true
    name: net-public
